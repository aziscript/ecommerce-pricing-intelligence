version: 2

sources:
  - name: ecommerce
    description: "Raw ecommerce operational tables written by the stream processor."
    schema: ecommerce
    tables:
      - name: products
        description: "Canonical product catalog — 30 SKUs across 5 categories."
        columns:
          - name: product_id
            description: "Primary key."
          - name: product_name
            description: "Human-readable product name."
          - name: category
            description: "Product category: phones, laptops, headphones, tablets, accessories."
          - name: base_price
            description: "Current listed price."

      - name: clickstream_events
        description: "Raw user interaction events from the Kafka consumer."
        columns:
          - name: event_id
            description: "UUID primary key."
          - name: user_id
            description: "User identifier."
          - name: session_id
            description: "Browser session UUID."
          - name: event_type
            description: "One of: page_view, product_view, add_to_cart, remove_from_cart, purchase."
          - name: product_id
            description: "Product involved in the event (NULL for page_view)."
          - name: product_price
            description: "Price at time of event."
          - name: device_type
            description: "mobile, desktop, or tablet."
          - name: timestamp
            description: "Event timestamp with timezone."

      - name: inventory_events
        description: "Immutable audit log of all stock movements."
        columns:
          - name: event_id
            description: "UUID primary key."
          - name: product_id
            description: "Product affected."
          - name: warehouse_id
            description: "One of: WH-LAGOS, WH-ABUJA, WH-PH."
          - name: event_type
            description: "Type of stock movement."
          - name: quantity_change
            description: "Signed integer — positive = restock, negative = sale/shrinkage."
          - name: timestamp
            description: "Event timestamp with timezone."

      - name: inventory_state
        description: "Current stock level per product per warehouse."

      - name: competitor_prices
        description: "All historical competitor price observations."
        columns:
          - name: product_id
            description: "Product being monitored."
          - name: competitor_name
            description: "One of: TechMart, GadgetZone, ElectroHub."
          - name: competitor_price
            description: "Price observed at the competitor."
          - name: our_price
            description: "Our price at time of observation."
          - name: price_difference_pct
            description: "Percentage difference: (our_price - competitor_price) / competitor_price * 100."
          - name: timestamp
            description: "Observation timestamp."

      - name: pricing_recommendations
        description: "Output of the pricing engine — one row per product, refreshed every 60s."
        columns:
          - name: product_id
            description: "Product being recommended on."
          - name: recommendation
            description: "raise, lower, or hold."
          - name: confidence_score
            description: "Engine confidence between 0.0 and 1.0."
          - name: recommended_price
            description: "Suggested price if recommendation is raise or lower."

      - name: product_metrics
        description: "Rolling KPIs per product maintained by the stream processor."
