apiVersion: 1

datasources:
  - name:      Prometheus
    type:      prometheus
    uid:       prometheus
    access:    proxy
    url:       http://prometheus:9090
    isDefault: true
    jsonData:
      httpMethod:        POST
      prometheusType:    Prometheus
      prometheusVersion: "2.45.0"
      timeInterval:      "15s"
      exemplarTraceIdDestinations: []
    editable: true
